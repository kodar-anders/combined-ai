name: Bug report
description: Report a defect so it can be reproduced and fixed.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! A clear, minimal reproduction
        is the single most useful thing you can provide.

        **Do not report security vulnerabilities here** — see our
        [Security Policy](https://github.com/kodar-anders/combined-ai/security/policy)
        to report privately instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched [existing issues](https://github.com/kodar-anders/combined-ai/issues?q=is%3Aissue) and this isn't a duplicate.
          required: true
        - label: I'm using the latest published version (or have noted below why I can't upgrade).
          required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        The smallest code snippet that triggers the bug. **Redact API keys and
        any other secrets** — never paste real credentials.
      render: typescript
    validations:
      required: true
  - type: dropdown
    id: providers
    attributes:
      label: Which provider(s) are involved?
      description: Select all that apply.
      multiple: true
      options:
        - anthropic
        - openai
        - google (Gemini)
        - custom (openai-compatible / BYO provider)
        - not provider-specific
    validations:
      required: true
  - type: dropdown
    id: strategy
    attributes:
      label: Combine strategy (if applicable)
      options:
        - "n/a — single-provider (complete/stream)"
        - consensus
        - pipeline
        - ensemble
        - broadcast
    validations:
      required: false
  - type: input
    id: lib-version
    attributes:
      label: combined-ai version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v20.11.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 24.04, Windows 11
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error output / ProviderError details
      description: |
        Paste any stack trace or error. For a `ProviderError`, include its
        `kind`, `status`, and `code` if available.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, workarounds tried.
    validations:
      required: false
