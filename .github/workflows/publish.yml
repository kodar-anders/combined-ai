name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to create the GitHub release
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: yarn
      - run: yarn install --immutable

      # Guard: the pushed tag must match package.json version (e.g. tag v0.2.0 -> "0.2.0").
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test

      # `prepack` (yarn build) runs automatically as part of publish.
      # Auth is via npm trusted publishing (OIDC) — no token needed.
      # Yarn 4.9+ performs the OIDC exchange when no YARN_NPM_AUTH_TOKEN is set.
      - name: Publish to npm
        run: yarn npm publish --access public --provenance

      # Create a GitHub release for the tag. Notes come from the matching
      # CHANGELOG.md section (## [<version>] ...); if that section is empty,
      # fall back to auto-generated notes from commits/PRs.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ] && grep -q '[^[:space:]]' release-notes.md; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
